<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>tarjetas</title>
</head>
<body>
    <style>
        @import url("https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap");

body {
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
	margin: 0;
	background: #000;
	font-family: "Poppins", serif;
	font-weight: 700;
}

/* 👇 tamaño fijo de la tarjeta */
.card {
	position: relative;
	width: 320px;
	height: 400px;
	perspective: 1000px;
	/* overflow: hidden; */
	/*border-radius: 20px;
	box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
	background-color: #c4d9e9;*/
}

/* 👇 capas ocupan toda la tarjeta */
.parallax-layer {
	position: absolute;
	inset: 0;
	/*width: 100%;
	height: 100%;*/
}

/* 👇 imagen cubre perfectamente la tarjeta */
.parallax-layer img {
	width: 100%;
	height: 100%;
	/*object-fit: cover;*/
	display: block;
	margin: 0;
}

/* 👇 elimina reglas que rompían el layout */
.bg {
	height: 100%;
	max-height: none;
}

.parallax-layer:nth-child(1) {
	z-index: 0;
	/*filter: blur(5px);*/
}
.parallax-layer:nth-child(2) {
	z-index: 1;
	/*filter: blur(3px);*/
}
.parallax-layer:nth-child(3) {
	z-index: 2;
	/*filter: blur(2px);*/
}
.parallax-layer:nth-child(4) {
	z-index: 3;
	/*filter: blur(0px);*/
}
.parallax-layer:nth-child(5) {
	z-index: 4;
	/*filter: blur(2px);*/
}
.parallax-layer:nth-child(6) {
	z-index: 5;
	/*filter: blur(3px);*/
}
.parallax-layer:nth-child(7) {
	z-index: 6;
	/*filter: blur(5px);*/
}

.parallax-layer img {
	margin-top: calc(-13% + var(--layer-offset, 0%));
}

.card-content {
	position: absolute;
	z-index: 10;
	text-align: left;
	color: white;
	pointer-events: none;
	bottom: 0;
	padding: 32px;
	font-size: 20px;
	line-height: 0;
}

    </style>
    <div class="card">
		<div class="parallax-layer">
			<img src="./nucleo.png">
        </div>
		<div class="parallax-layer bg">
			<img src="./marco.png">
		</div>
    </div>
    <script>
        const card = document.querySelector(".card");
const layers = document.querySelectorAll(".parallax-layer");
let isHovered = false;

function applyParallaxEffect(x, y) {
	const tiltY = (x - 0.5) * 60;
	layers.forEach((layer, index) => {
		const depthX = index * 30;
		const depthY = index * 13;
		const moveX = (x - 0.5) * depthX;
		const moveY = (y - 0.5) * depthY;
		layer.style.transform = `translate(${moveX}px, ${moveY}px) rotateY(${tiltY}deg)`;
	});
}

card.addEventListener("mousemove", (e) => {
	const rect = card.getBoundingClientRect();
	const x = (e.clientX - rect.left) / rect.width;
	const y = (e.clientY - rect.top) / rect.height;
	isHovered = true;
	applyParallaxEffect(x, y);
});

window.addEventListener("load", () => {
	let progress = 0;

	function animate() {
		if (isHovered) return;
		progress += 0.005;
		const x = Math.sin(progress) * 0.5 + 0.5;
		const y = 0.5;
		applyParallaxEffect(x, y);
		if (progress < Math.PI * 2) {
			requestAnimationFrame(animate);
		}
	}
	animate();
});

    </script>
</body>
</html>
